<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <!-- Office desk: warm wood top + monitor + lamp + papers + mug -->
  <!-- ── desktop slab ── -->
  <rect x="6" y="40" width="228" height="22" rx="3" fill="#7a4524" stroke="#2a1408" stroke-width="2"/>
  <!-- highlight rail -->
  <rect x="10" y="44" width="220" height="3" fill="#a6643c"/>
  <!-- drawer line under -->
  <line x1="14" y1="58" x2="226" y2="58" stroke="#2a1408" stroke-width="1.5" opacity="0.65"/>
  <!-- two front legs -->
  <rect x="10" y="62" width="6" height="14" fill="#2a1408"/>
  <rect x="224" y="62" width="6" height="14" fill="#2a1408"/>

  <!-- ── monitor on top, left of center ── -->
  <g transform="translate(54 6)">
    <rect x="-2" y="-2" width="48" height="36" rx="2.5" fill="#181c25" stroke="#0a060a" stroke-width="2"/>
    <rect x="2" y="2" width="40" height="28" fill="#3aa0c8" stroke="#0a060a" stroke-width="1"/>
    <!-- spreadsheet grid hint -->
    <line x1="2" y1="11" x2="42" y2="11" stroke="#9ad7eb" stroke-width="0.6"/>
    <line x1="2" y1="20" x2="42" y2="20" stroke="#9ad7eb" stroke-width="0.6"/>
    <line x1="15" y1="2" x2="15" y2="30" stroke="#9ad7eb" stroke-width="0.6"/>
    <line x1="28" y1="2" x2="28" y2="30" stroke="#9ad7eb" stroke-width="0.6"/>
    <!-- stand -->
    <rect x="18" y="34" width="6" height="4" fill="#0a060a"/>
    <rect x="10" y="38" width="22" height="2.5" rx="1" fill="#0a060a"/>
  </g>

  <!-- ── lamp, far right ── -->
  <g transform="translate(178 6)">
    <!-- base -->
    <ellipse cx="20" cy="36" rx="10" ry="2.5" fill="#16161d"/>
    <!-- arm -->
    <path d="M 20 36 Q 24 22 32 14" fill="none" stroke="#16161d" stroke-width="3" stroke-linecap="round"/>
    <!-- shade -->
    <path d="M 28 4 L 44 16 L 36 24 L 22 12 Z" fill="#d7b56a" stroke="#0a060a" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- light cone hint -->
    <path d="M 30 24 L 50 38 L 28 38 Z" fill="#fff6e8" opacity="0.18"/>
  </g>

  <!-- ── papers stack, between monitor and lamp ── -->
  <g transform="translate(110 22)">
    <rect x="0" y="6" width="34" height="14" rx="1" fill="#f4ecd8" stroke="#7a4424" stroke-width="1"/>
    <rect x="2" y="4" width="30" height="14" rx="1" fill="#fff6e8" stroke="#7a4424" stroke-width="1" transform="rotate(-3 17 11)"/>
    <line x1="6" y1="9" x2="22" y2="9" stroke="#7a4424" stroke-width="0.6"/>
    <line x1="6" y1="12" x2="26" y2="12" stroke="#7a4424" stroke-width="0.6"/>
    <line x1="6" y1="15" x2="20" y2="15" stroke="#7a4424" stroke-width="0.6"/>
  </g>

  <!-- ── coffee mug, bottom-right of monitor ── -->
  <g transform="translate(154 30)">
    <rect x="0" y="0" width="12" height="11" rx="1.5" fill="#f4ecd8" stroke="#0a060a" stroke-width="1.5"/>
    <path d="M 12 3 Q 17 5.5 12 8" fill="none" stroke="#0a060a" stroke-width="1.5"/>
    <!-- coffee surface -->
    <ellipse cx="6" cy="2" rx="4" ry="1" fill="#3a1a08"/>
  </g>
</svg>
